name: smart_attendance
description: Smart Attendance System - Flutter Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP & Networking
  dio: ^5.4.3+1
  retrofit: ^4.1.0

  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.2.0

  # UI & Icons
  cupertino_icons: ^1.0.6
  lucide_icons: ^0.257.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.0

  # Date & Time
  intl: ^0.19.0

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.10.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.2.0
  firebase_analytics: ^10.5.0

  # QR Code (for attendance marking)
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0
  camera: ^0.10.5
  permission_handler: ^11.4.4

  # Image
  cached_network_image: ^3.3.1

  # Utils
  uuid: ^4.3.3
  logger: ^2.3.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
