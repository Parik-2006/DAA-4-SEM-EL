version: '3.8'

services:
  web-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attendance-web-dashboard
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_POLLING_INTERVAL=5000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - attendance-network

networks:
  attendance-network:
    driver: bridge
